<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body>
    <header class="py-11">
      <div class="container max-w-330 px-5 mx-auto flex justify-between">
        <a
          href="/"
          class="header__left transition hover:opacity-70 active:opacity-40"
        >
          <img
            src="./images/header/site-logo.svg"
            width="236"
            height="26"
            alt="Site Logo"
          />
        </a>

        <ul class="header__right max-w-[305px] w-[100%] gap-8 flex">
          <li
            class="font-bold text-xs leading-4 tracking-[1px] uppercase text-[#83888F]"
          >
            <a
              class="transition hover:opacity-70 active:text-[#333D4B]"
              href="#"
              >HOME</a
            >
          </li>
          <li
            class="font-bold text-xs leading-4 tracking-[1px] uppercase text-[#83888F]"
          >
            <a
              class="transition hover:opacity-70 active:text-[#333D4B]"
              href="#"
              >ABOUT US</a
            >
          </li>
          <li
            class="font-bold text-xs leading-4 tracking-[1px] uppercase text-[#83888F]"
          >
            <a
              class="transition hover:opacity-70 active:text-[#333D4B]"
              href="#"
              >Create your plan</a
            >
          </li>
        </ul>
      </div>
    </header>

    <main>
      <section class="hero mb-[68px]">
        <div class="container hero__container max-w-330 w-100% px-5 mx-auto">
          <div class="hero__wrapper rounded-[10px]">
            <div class="pl-[85px] pt-[117px] pb-[116px]">
              <h2
                class="max-w-[493px] font-black text-[#FEFCF7] text-7xl leading-18 mb-8"
              >
                Great coffee made simple.
              </h2>
              <p class="max-w-[445px] text-[#FEFCF7] text-base leading-4 mb-14">
                Start your mornings with the world’s best coffees. Try our
                expertly curated artisan coffees from our best roasters
                delivered directly to your door, at your schedule.
              </p>
              <button
                class="max-w-[217px] w-[100%] rounded-[6px] px-[31px] py-[15px] cursor-pointer bg-[#0E8784] font-black text-[#FEFCF7] text-lg leading-[25px] transition hover:bg-[#66D2CF] active:bg-[#29a39f]"
              >
                Create your plan
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="collection mt-[68px]">
        <div class="container"></div>
      </section>
    </main>
  </body>
</html>
